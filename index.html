<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QTRIP Shore — Make Every Port Count</title>
    <meta name="description" content="Skip overpriced ship excursions. Plan your own cruise port-day adventures with curated activities, local guides, and tight timing. Barcelona, Dubrovnik, Santorini, Naples, and more." />
    <meta name="keywords" content="cruise shore excursions, port excursions, onshore activities, cruise port tours, independent shore excursions, Barcelona port, Dubrovnik excursion, Santorini tour, Naples port day" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="author" content="QTRIP Shore" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="QTRIP Shore — Make Every Port Count" />
    <meta property="og:description" content="Plan your own cruise port-day adventures. Curated activities, local guides, and AI-powered scheduling that respects your ship's schedule." />
    <meta property="og:url" content="https://shore.qtrip.app" />
    <meta property="og:image" content="https://shore.qtrip.app/og-image.svg" />
    <meta property="og:site_name" content="QTRIP Shore" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="es_ES" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QTRIP Shore — Make Every Port Count" />
    <meta name="twitter:description" content="Cruise port excursion planner with AI scheduling that respects your ship's schedule." />
    <meta name="twitter:image" content="https://shore.qtrip.app/og-image.svg" />

    <!-- Canonical + hreflang -->
    <link rel="canonical" href="https://shore.qtrip.app/" />
    <link rel="alternate" hreflang="en" href="https://shore.qtrip.app/" />
    <link rel="alternate" hreflang="fr" href="https://shore.qtrip.app/" />
    <link rel="alternate" hreflang="es" href="https://shore.qtrip.app/" />
    <link rel="alternate" hreflang="x-default" href="https://shore.qtrip.app/" />

    <!-- Favicon & Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "QTRIP Shore",
      "url": "https://shore.qtrip.app",
      "logo": "https://shore.qtrip.app/favicon.svg",
      "image": "https://shore.qtrip.app/og-image.svg",
      "description": "Skip overpriced ship excursions. Plan your own cruise port-day adventures with curated activities, local guides, and AI-powered scheduling.",
      "areaServed": [
        { "@type": "City", "name": "Barcelona", "addressCountry": "ES" },
        { "@type": "City", "name": "Dubrovnik", "addressCountry": "HR" },
        { "@type": "City", "name": "Santorini", "addressCountry": "GR" },
        { "@type": "City", "name": "Naples", "addressCountry": "IT" },
        { "@type": "City", "name": "Nassau", "addressCountry": "BS" },
        { "@type": "City", "name": "Cozumel", "addressCountry": "MX" }
      ],
      "knowsLanguage": ["en", "fr", "es"],
      "priceRange": "$$"
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does QTRIP Shore work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Select your cruise ports, pick activities from our curated catalog, and our AI builds a schedule that respects your ship's dock and reboard times. Get an instant quote for your group."
          }
        },
        {
          "@type": "Question",
          "name": "Is it cheaper than ship excursions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Typically 30-60% cheaper than cruise line excursions. We work with local guides and operators directly, cutting out the middleman markup."
          }
        },
        {
          "@type": "Question",
          "name": "What if I'm late getting back to the ship?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our AI scheduler factors in travel time from each activity back to the port and adds a safety buffer. You'll see warnings if any activity risks cutting it close."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[100] focus:rounded-lg focus:bg-white focus:px-4 focus:py-2 focus:text-sky-600 focus:shadow-lg">
      Skip to content
    </a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
